services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: moneytransfer-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/MoneyTransfer.Api
    container_name: moneytransfer-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=MoneyTransferDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # The browser (not other containers) is what calls this URL, so it
        # must be the host-mapped API port, not the "api" service name.
        VITE_API_BASE_URL: "http://localhost:8080/api"
    container_name: moneytransfer-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
